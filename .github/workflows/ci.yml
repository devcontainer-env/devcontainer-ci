name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  test:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Install Dependencies
        run: nix develop --command npm ci

      - name: Check Format
        run: nix develop --command npm run format:check

      - name: Lint
        run: nix develop --command npm run lint

      - name: Test
        run: nix develop --command npm run ci-test

  release:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          manifest-file: .github/config/release-please-manifest.json
          config-file: .github/config/release-please-config.json
          target-branch: main

  build:
    needs: release
    if: ${{ needs.release.outputs.pr != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ fromJSON(needs.release.outputs.pr).headBranchName }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: disabled
          use-gha-cache: enabled

      - name: Install Dependencies
        run: nix develop --command npm ci

      - name: Build Dist
        run: nix develop --command npm run package

      - name: Commit Dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force dist/*
          git diff --cached --quiet || git commit -m "chore: auto-generate dist ${{ needs.release.outputs.tag_name }}"
          git push

  tag-major:
    needs: release
    if: ${{ needs.release.outputs.release_created }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    env:
      GIT_TAG: v${{ needs.release.outputs.major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$GIT_TAG" -m "chore: update $GIT_TAG to ${{ needs.release.outputs.tag_name }}"
          git push origin "$GIT_TAG" --force
